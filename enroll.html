<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment - Teddi Kidz Play School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Lexend', sans-serif; }
        h1, h2 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .animated-gradient {
            background: linear-gradient(-45deg, #f7f9fb, #fff9e6, #f0fdfa, #f7f9fb);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-surface-bright min-h-screen flex items-center justify-center p-4 sm:p-6 animated-gradient">

    <div class="max-w-2xl w-full bg-white rounded-[2rem] sm:rounded-[3rem] shadow-2xl p-6 sm:p-10 relative overflow-hidden border border-yellow-100">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-primary-container/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-secondary-container/20 rounded-full blur-3xl"></div>

        <div class="relative z-10">
            <div class="flex items-center gap-4 mb-6 sm:mb-8">
                <a href="index.html" class="p-2 hover:bg-slate-100 rounded-full transition-all">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <h1 class="text-xl sm:text-3xl font-black text-on-surface">Admission Form 2026-27</h1>
            </div>

            <form class="space-y-6" id="enrollForm">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-slate-500 uppercase ml-2">Parent Name</label>
                        <input id="pName" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-primary focus:bg-white transition-all outline-none" placeholder="John Doe" type="text" required/>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-slate-500 uppercase ml-2">Phone Number</label>
                        <input id="pPhone" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-primary focus:bg-white transition-all outline-none" placeholder="+91 00000 00000" type="tel" required/>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-semibold text-slate-500 uppercase ml-2">Child's Age</label>
                    <select id="pAge" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-primary focus:bg-white transition-all outline-none">
                        <option>1.5 - 2.5 Years (Play Group)</option>
                        <option>2.5 - 3.5 Years (Nursery)</option>
                        <option>3.5 - 4.5 Years (Junior KG)</option>
                        <option>4.5 - 5.5 Years (Senior KG)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-semibold text-slate-500 uppercase ml-2">Your Message</label>
                    <textarea id="pMsg" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-primary focus:bg-white transition-all outline-none" placeholder="Anything else you'd like us to know?" rows="4"></textarea>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 pt-4">
                    <button class="flex-1 py-5 rounded-2xl bg-primary text-white font-bold hover:scale-[1.02] active:scale-95 transition-all shadow-lg flex items-center justify-center gap-2" type="submit">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-11.7 8.38 8.38 0 0 1 3.8.9L21 3z"></path></svg>
                        Share via WhatsApp
                    </button>
                    <button class="flex-1 py-5 rounded-2xl bg-secondary text-white font-bold hover:scale-[1.02] active:scale-95 transition-all shadow-lg flex items-center justify-center gap-2" type="button" id="btnEmail">
                        <span class="material-symbols-outlined">mail</span>
                        Share via Email
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('enrollForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('pName').value;
            const phone = document.getElementById('pPhone').value;
            const age = document.getElementById('pAge').value;
            const msg = document.getElementById('pMsg').value;
            
            const text = `*Teddi Kidz Admission Inquiry*%0A%0A*Parent Name:* ${name}%0A*Phone:* ${phone}%0A*Child Age:* ${age}%0A*Message:* ${msg}`;
            window.open(`https://wa.me/919626119811?text=${text}`, '_blank');
        });

        document.getElementById('btnEmail').addEventListener('click', function() {
            const name = document.getElementById('pName').value;
            const phone = document.getElementById('pPhone').value;
            const age = document.getElementById('pAge').value;
            const msg = document.getElementById('pMsg').value;
            
            const subject = "Admission Inquiry - Teddi Kidz";
            const body = `Parent Name: ${name}\nPhone: ${phone}\nChild Age: ${age}\n\nMessage: ${msg}`;
            window.location.href = `mailto:teddikidz@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        });
    </script>
</body>
</html>
